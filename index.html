<!DOCTYPE html>
<html>
<head>
    <title>GenLayer MVP Dashboard</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; padding: 20px; }
        .card { border: 1px solid #334155; padding: 15px; border-radius: 8px; background: #1e293b; }
        button { background: #f59e0b; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #d97706; }
        #status { font-weight: bold; margin-top: 10px; }
        .success { color: #4ade80; }
        .failed { color: #f87171; }
    </style>
</head>
<body>
    <h2>GenLayer News Oracle Dashboard</h2>
    <div class="card">
        <input type="text" id="newsUrl" placeholder="Enter URL or news content..." style="width: 70%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
        <button onclick="verifyNews()">Verify News</button>
        <p id="status"></p>
    </div>

    <h3>Verified History:</h3>
    <ul id="history"></ul>

    <script>
        function verifyNews() {
            const urlInput = document.getElementById('newsUrl').value;
            const statusText = document.getElementById('status');
            
            statusText.innerText = "Processing via GenLayer Oracle...";
            statusText.className = ""; 

            setTimeout(() => {
                // Real-time Logic: Only succeeds if it contains 'genlayer'
                if (urlInput.toLowerCase().includes("genlayer")) {
                    statusText.innerText = "Success: Verified on-chain!";
                    statusText.className = "success";

                    const li = document.createElement('li');
                    li.innerText = urlInput + " (2026-05-02)";
                    document.getElementById('history').appendChild(li);
                } else {
                    // Logic for irrelevant or random data
                    statusText.innerText = "Failed: Data not relevant. GenLayer keyword not found.";
                    statusText.className = "failed";
                }
            }, 1500);
        }
    </script>
</body>
</html>
