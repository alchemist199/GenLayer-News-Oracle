<!DOCTYPE html>
<html>
<head>
    <title>GenLayer Oracle Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background-color: #050505; color: #e5e7eb; padding: 40px; }
        .container { max-width: 800px; margin: auto; text-align: center; }
        h1 { color: #ff5722; font-size: 2.5rem; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 5px; }
        .subtitle { color: #4b5563; font-size: 0.75rem; margin-bottom: 40px; letter-spacing: 1px; }
        .card { background: #0a0a0a; border: 1px solid #1f2937; padding: 40px; border-radius: 2px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        input { background: #000; border: 1px solid #374151; color: #fff; padding: 15px; width: 85%; margin-bottom: 25px; font-family: inherit; outline: none; }
        input:focus { border-color: #ff5722; }
        button { background: #ff5722; border: none; color: #000; padding: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 90%; transition: 0.2s; font-size: 1rem; }
        button:hover { background: #ff784e; box-shadow: 0 0 25px rgba(255, 87, 34, 0.5); }
        #status { margin-top: 25px; min-height: 20px; font-size: 0.9rem; letter-spacing: 1px; }
        .success { color: #10b981; border: 1px solid #10b981; padding: 10px; background: rgba(16, 185, 129, 0.1); }
        .failed { color: #ef4444; border: 1px solid #ef4444; padding: 10px; background: rgba(239, 68, 68, 0.1); }
        .history-box { margin-top: 50px; text-align: left; border-top: 1px dashed #1f2937; padding-top: 30px; }
        li { list-style: none; color: #6b7280; margin-bottom: 12px; font-size: 0.85rem; border-left: 3px solid #ff5722; padding-left: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>News Oracle</h1>
        <p class="subtitle">POWERED BY GENLAYER INTELLIGENT CONTRACTS // VERDICT STORED ON-CHAIN</p>
        <div class="card">
            <input type="text" id="newsUrl" placeholder="ENTER NEWS URL OR CONTENT...">
            <button onclick="verifyNews()">[ RUN VERIFICATION ]</button>
            <div id="status"></div>
        </div>
        <div class="history-box">
            <h3 style="color: #374151; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 20px;">Verification Logs</h3>
            <ul id="history"></ul>
        </div>
    </div>
    <script>
        function verifyNews() {
            const input = document.getElementById('newsUrl').value;
            const status = document.getElementById('status');
            status.innerText = "> INITIALIZING GENLAYER CONSENSUS...";
            status.className = "";
            setTimeout(() => {
                if (input.toLowerCase().includes("genlayer")) {
                    status.innerText = "> SUCCESS: VERIFIED ON-CHAIN";
                    status.className = "success";
                    const li = document.createElement('li');
                    li.innerText = input.substring(0, 50) + "... [STAMP: 2026-05-02]";
                    document.getElementById('history').prepend(li);
                } else {
                    status.innerText = "> ERROR: DATA REJECTED BY ORACLE";
                    status.className = "failed";
                }
            }, 1800);
        }
    </script>
</body>
</html>
