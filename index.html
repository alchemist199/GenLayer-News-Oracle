<!DOCTYPE html>
<html>
<head>
    <title>GenLayer Oracle // Minimalist</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background-color: #000000; color: #ffffff; padding: 40px; margin: 0; }
        .container { max-width: 800px; margin: auto; text-align: center; }
        h1 { color: #ffffff; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 6px; margin-bottom: 5px; }
        .subtitle { color: #4b5563; font-size: 0.7rem; margin-bottom: 40px; letter-spacing: 1px; }
        
        .card { background: #000; border: 1px solid #333; padding: 40px; border-radius: 0px; }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 15px; width: 85%; margin-bottom: 25px; font-family: inherit; outline: none; border-radius: 0; }
        input:focus { border-color: #fff; }
        
        /* Solid White Button */
        button { background: #ffffff; border: 1px solid #ffffff; color: #000000; padding: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 90%; transition: 0.2s; font-size: 0.9rem; letter-spacing: 2px; }
        button:hover { background: #000000; color: #ffffff; }
        
        #status { margin-top: 25px; min-height: 20px; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; }
        .success { color: #ffffff; border: 1px solid #ffffff; padding: 10px; }
        .failed { color: #f87171; border: 1px solid #f87171; padding: 10px; background: rgba(248, 113, 113, 0.1); }
        
        .history-box { margin-top: 50px; text-align: left; border-top: 1px dashed #333; padding-top: 30px; }
        li { list-style: none; color: #6b7280; margin-bottom: 12px; font-size: 0.8rem; border-left: 1px solid #ffffff; padding-left: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>GenLayer News Oracle</h1>
        <p class="subtitle">INTELLIGENT CONTRACTS // ON-CHAIN VERIFICATION</p>
        
        <div class="card">
            <input type="text" id="newsUrl" placeholder="ENTER URL OR CONTENT FOR VERIFICATION...">
            <button onclick="verifyNews()">[ Run Oracle Call ]</button>
            <div id="status"></div>
        </div>

        <div class="history-box">
            <h3 style="color: #4b5563; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 20px;">On-Chain Logs</h3>
            <ul id="history"></ul>
        </div>
    </div>

    <script>
        function verifyNews() {
            const input = document.getElementById('newsUrl').value;
            const status = document.getElementById('status');
            
            status.innerText = "> INITIALIZING ORACLE...";
            status.className = "";

            setTimeout(() => {
                if (input.toLowerCase().includes("genlayer")) {
                    status.innerText = "> STATUS: SUCCESS // VERDICT ON-CHAIN";
                    status.className = "success";
                    const li = document.createElement('li');
                    li.innerText = input.substring(0, 50) + "... [VERIFIED]";
                    document.getElementById('history').prepend(li);
                } else {
                    status.innerText = "> STATUS: FAILED // DATA REJECTED";
                    status.className = "failed";
                }
            }, 1000);
        }
    </script>
</body>
</html>
